<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>행운의 숫자 5개</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      text-align: center;
      width: min(90vw, 560px);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 2rem;
    }
    p {
      color: #475569;
      margin-bottom: 24px;
    }
    .numbers {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .ball {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: bold;
      background: #2563eb;
      color: white;
      box-shadow: 0 6px 14px rgba(37,99,235,0.25);
    }
    button {
      border: none;
      background: #0f172a;
      color: white;
      padding: 12px 18px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>행운의 숫자 5개</h1>
    <p>버튼을 누를 때마다 1부터 45 사이의 숫자 5개를 무작위로 보여줍니다.</p>
    <div class="numbers" id="numbers"></div>
    <button onclick="generateNumbers()">다시 뽑기</button>
  </div>

  <script>
    function generateNumbers() {
      const picked = new Set();
      while (picked.size < 5) {
        const num = Math.floor(Math.random() * 45) + 1;
        picked.add(num);
      }

      const sorted = [...picked].sort((a, b) => a - b);
      const container = document.getElementById("numbers");
      container.innerHTML = "";

      sorted.forEach(num => {
        const ball = document.createElement("div");
        ball.className = "ball";
        ball.textContent = num;
        container.appendChild(ball);
      });
    }

    generateNumbers();
  </script>
</body>
</html>
